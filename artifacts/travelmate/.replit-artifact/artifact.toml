kind = "web"
previewPath = "/"
title = "TravelMate"
version = "1.0.0"
id = "artifacts/travelmate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25713
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/travelmate run dev"

[services.env]
PORT = "25713"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/travelmate", "run", "build"]
publicDir = "artifacts/travelmate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
