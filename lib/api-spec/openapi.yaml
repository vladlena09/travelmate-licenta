openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TravelMate API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: travel
    description: Travel planning operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /geocode:
    get:
      operationId: geocodeCity
      tags: [travel]
      summary: Geocode a city
      parameters:
        - name: city
          in: query
          required: true
          schema:
            type: string
        - name: country
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Geocoded location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeocodedLocation"
        "404":
          description: City not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pois:
    get:
      operationId: getPois
      tags: [travel]
      summary: Get points of interest
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lon
          in: query
          required: true
          schema:
            type: number
        - name: radius
          in: query
          required: false
          schema:
            type: number
            default: 5000
      responses:
        "200":
          description: List of POIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  pois:
                    type: array
                    items:
                      $ref: "#/components/schemas/Poi"
                required:
                  - pois

  /itinerary/generate:
    post:
      operationId: generateItinerary
      tags: [travel]
      summary: Generate a travel itinerary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryRequest"
      responses:
        "200":
          description: Generated itinerary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    GeocodedLocation:
      type: object
      properties:
        city:
          type: string
        country:
          type: string
        lat:
          type: number
        lon:
          type: number
        displayName:
          type: string
      required:
        - city
        - lat
        - lon
        - displayName

    Poi:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        lat:
          type: number
        lon:
          type: number
        estimatedDuration:
          type: number
          description: Duration in minutes
        estimatedCost:
          type: number
          description: Cost in EUR
        isMustSee:
          type: boolean
        isFree:
          type: boolean
        optionalPaidExperience:
          type: string
          nullable: true
        optionalPaidCost:
          type: number
          nullable: true
        popularityScore:
          type: number
        imageUrl:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        openingHours:
          type: string
          nullable: true
        walkingMinutesFromPrev:
          type: number
          nullable: true
          description: Estimated walking minutes from previous POI
        transportNote:
          type: string
          nullable: true
          description: Transport hint for getting to this POI
      required:
        - id
        - name
        - category
        - lat
        - lon
        - estimatedDuration
        - estimatedCost
        - isMustSee
        - isFree
        - popularityScore

    ItineraryRequest:
      type: object
      properties:
        city:
          type: string
        country:
          type: string
        days:
          type: number
          minimum: 1
          maximum: 14
        budgetAmount:
          type: number
          minimum: 0
          description: Total trip budget in EUR (0 = unlimited)
        travelRhythm:
          type: string
          enum: [relaxed, balanced, dynamic]
        travelProfile:
          type: string
          enum: [solo, couple, family, group]
        transportMode:
          type: string
          enum: [walking, car, public_transport]
        interests:
          type: array
          items:
            type: string
            enum:
              - history
              - gastronomy
              - culture
              - nature
              - architecture
              - nightlife
              - sports
              - relaxation
              - photography
        priorityMode:
          type: string
          enum: [iconic, mixed]
          description: iconic = prioritize famous landmarks; mixed = blend iconic + hidden gems
        startTime:
          type: string
          enum: [early, normal, late]
          description: Preferred start time of day (early=8am, normal=9-10am, late=11am+)
        regenerateDayNumber:
          type: number
          description: If set, only regenerate this specific day number (keep rest unchanged)
      required:
        - city
        - days
        - budgetAmount
        - travelRhythm
        - travelProfile
        - transportMode
        - interests
        - priorityMode

    TransportSegment:
      type: object
      properties:
        fromPoiId:
          type: string
        toPoiId:
          type: string
        mode:
          type: string
        durationMinutes:
          type: number
        distanceMetres:
          type: number
        instruction:
          type: string
      required:
        - fromPoiId
        - toPoiId
        - mode
        - durationMinutes
        - distanceMetres
        - instruction

    ItineraryDay:
      type: object
      properties:
        dayNumber:
          type: number
        theme:
          type: string
        pois:
          type: array
          items:
            $ref: "#/components/schemas/Poi"
        segments:
          type: array
          items:
            $ref: "#/components/schemas/TransportSegment"
        totalDuration:
          type: number
          description: Total visit duration in minutes
        travelDuration:
          type: number
          description: Total travel time between POIs in minutes
        totalCost:
          type: number
        budgetUsed:
          type: number
          description: Cumulative budget used up to this day
        transportSummary:
          type: string
          description: Human-readable transport description for the day
      required:
        - dayNumber
        - theme
        - pois
        - segments
        - totalDuration
        - travelDuration
        - totalCost
        - budgetUsed
        - transportSummary

    ItineraryResponse:
      type: object
      properties:
        city:
          type: string
        country:
          type: string
        lat:
          type: number
        lon:
          type: number
        transportMode:
          type: string
        days:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryDay"
        totalEstimatedCost:
          type: number
        budgetAmount:
          type: number
        budgetRemaining:
          type: number
        generatedAt:
          type: string
      required:
        - city
        - country
        - lat
        - lon
        - transportMode
        - days
        - totalEstimatedCost
        - budgetAmount
        - budgetRemaining
        - generatedAt
